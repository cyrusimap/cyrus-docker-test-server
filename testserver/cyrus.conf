START {
    recover cmd="/usr/cyrus/bin/ctl_cyrusdb -r"
}
SERVICES {
    lmtp listen={{LMTPPORT}} cmd="lmtpd -a"
    http listen={{HTTPPORT}} cmd="httpd"
    pop3 listen={{POP3PORT}} cmd="pop3d"
    imap listen={{IMAPPORT}} cmd="imapd"
    sieve listen={{SIEVEPORT}} cmd="timsieved"
}

EVENTS {
  checkpoint cmd="ctl_cyrusdb -c" period=180
}

DAEMON {
  idled cmd="idled"
  squatter cmd="squatter -R -p"
  calalarmd cmd="calalarmd"
  fakesaslauthd cmd="/usr/cyrus/bin/fakesaslauthd -p /var/run/cyrus/saslauthd.sock"
}
